services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ropa_lista}
      POSTGRES_USER: ${POSTGRES_USER:-ropa_lista}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
      TZ: America/Argentina/Buenos_Aires
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ropa_lista} -d ${POSTGRES_DB:-ropa_lista}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ropa_lista}
      DB_USERNAME: ${POSTGRES_USER:-ropa_lista}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
      JWT_SECRET_BASE64: ${JWT_SECRET_BASE64}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-PT15M}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-P30D}
      DEV_ADMIN_EMAIL: ${DEV_ADMIN_EMAIL:-admin@local.invalid}
      DEV_ADMIN_PASSWORD: ${DEV_ADMIN_PASSWORD:-change-me-local-only}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      TZ: America/Argentina/Buenos_Aires
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
