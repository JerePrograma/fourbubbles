services:
  postgres:
    image: postgres:16-alpine
    restart: "on-failure:3"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ropalista}
      POSTGRES_USER: ${POSTGRES_USER:-ropalista}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      TZ: America/Argentina/Buenos_Aires
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ropalista} -d ${POSTGRES_DB:-ropalista}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  backend:
    build:
      context: ./backend
    restart: "on-failure:3"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-ropalista}
      DB_USER: ${POSTGRES_USER:-ropalista}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      JWT_SECRET_BASE64: ${JWT_SECRET_BASE64:?JWT_SECRET_BASE64 is required}
      APP_DEV_ADMIN_USERNAME: ${APP_DEV_ADMIN_USERNAME:-admin}
      APP_DEV_ADMIN_PASSWORD: ${APP_DEV_ADMIN_PASSWORD:?APP_DEV_ADMIN_PASSWORD is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:8080}
      APP_TIME_ZONE: ${APP_TIME_ZONE:-America/Argentina/Buenos_Aires}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-8081}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/api/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: "on-failure:3"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --output-document=- http://127.0.0.1/ | grep --quiet '<div id=\"root\"></div>'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  postgres_data:
