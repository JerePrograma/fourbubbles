name: Generate frontend lockfile

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase-1-core
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Generate deterministic lockfile
        working-directory: frontend
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit lockfile when changed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- frontend/package-lock.json && git ls-files --error-unmatch frontend/package-lock.json >/dev/null 2>&1; then
            echo 'package-lock.json already up to date'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add frontend/package-lock.json
          git commit -m 'build: lock frontend dependencies'
          git push origin HEAD:agent/phase-1-core
