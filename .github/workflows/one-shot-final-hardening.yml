name: One-shot final hardening

on:
  pull_request:

permissions:
  contents: write

jobs:
  harden:
    if: github.head_ref == 'agent/0.1.2-administrative'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/0.1.2-administrative
          fetch-depth: 0

      - name: Apply idempotent hardening and remove temporary workflows
        shell: python
        run: |
          from pathlib import Path

          client = Path('backend/src/main/java/ar/com/ropalista/customer/application/ClientService.java')
          content = client.read_text(encoding='utf-8')
          content = content.replace(
              '.sorted(Comparator.comparing(Address::isPrimaryAddress).reversed().thenComparing(Address::getValidFrom).reversed())',
              '.sorted(Comparator.comparing(Address::isPrimaryAddress).reversed()\n                        .thenComparing(Address::getValidFrom, Comparator.reverseOrder()))'
          )
          old_add = '''        if (request.primaryAddress()) {
            activeAddresses.stream().filter(Address::isPrimaryAddress).forEach(Address::demotePrimary);
        }
        Address address = toAddress(request);'''
          new_add = '''        if (request.primaryAddress()) {
            activeAddresses.stream().filter(Address::isPrimaryAddress).forEach(Address::demotePrimary);
            addresses.flush();
        }
        Address address = toAddress(request);'''
          content = content.replace(old_add, new_add)
          old_primary = '''        addresses.findByClientIdAndActiveTrueOrderByPrimaryAddressDescValidFromDesc(clientId)
                .stream().filter(Address::isPrimaryAddress).forEach(Address::demotePrimary);
        target.makePrimary();'''
          new_primary = '''        addresses.findByClientIdAndActiveTrueOrderByPrimaryAddressDescValidFromDesc(clientId)
                .stream().filter(Address::isPrimaryAddress).forEach(Address::demotePrimary);
        addresses.flush();
        target.makePrimary();'''
          content = content.replace(old_primary, new_primary)
          client.write_text(content, encoding='utf-8')

          audit = Path('backend/src/main/java/ar/com/ropalista/audit/application/AuditQueryService.java')
          content = audit.read_text(encoding='utf-8')
          content = content.replace('builder.upper(root.get("entityType"))', 'builder.upper(root.<String>get("entityType"))')
          content = content.replace('builder.upper(root.get("action"))', 'builder.upper(root.<String>get("action"))')
          audit.write_text(content, encoding='utf-8')

          order = Path('backend/src/main/java/ar/com/ropalista/order/application/OrderService.java')
          content = order.read_text(encoding='utf-8')
          old_planning = '''        LaundryOrder order = find(id);
        var before = planningSummary(order);
        try {'''
          new_planning = '''        LaundryOrder order = find(id);
        if (order.getStatus() != OrderStatus.INQUIRY && order.getStatus() != OrderStatus.QUOTED) {
            throw new BusinessException("ORDER_NOT_EDITABLE",
                    "La planificación solo puede modificarse durante consulta o cotización", HttpStatus.UNPROCESSABLE_ENTITY);
        }
        var before = planningSummary(order);
        try {'''
          content = content.replace(old_planning, new_planning, 1)
          order.write_text(content, encoding='utf-8')

          editor = Path('frontend/src/pages/EditClientPage.tsx')
          content = editor.read_text(encoding='utf-8')
          marker = "import { useCallback, useEffect, useState } from 'react';"
          if "import type { FormEvent } from 'react';" not in content:
              content = content.replace(marker, marker + "\nimport type { FormEvent } from 'react';")
          content = content.replace('React.FormEvent<HTMLFormElement>', 'FormEvent<HTMLFormElement>')
          editor.write_text(content, encoding='utf-8')

          styles = Path('frontend/src/styles.css')
          css = styles.read_text(encoding='utf-8')
          css = css.replace('grid-template-columns: repeat(4,1fr);', 'grid-template-columns: repeat(auto-fit,minmax(0,1fr));', 1)
          styles.write_text(css, encoding='utf-8')

          for workflow in Path('.github/workflows').glob('one-shot-*.yml'):
              workflow.unlink()

      - name: Commit and push final hardening
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix: harden administrative consistency and remove temporary workflows"
          git pull --rebase origin agent/0.1.2-administrative
          git push origin HEAD:agent/0.1.2-administrative
