name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  statuses: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Unit and integration tests
        shell: bash
        run: |
          set +e
          mvn -B -Dstyle.color=never clean verify > /tmp/backend.log 2>&1
          code=$?
          if [ "$code" -ne 0 ]; then
            grep -E '^\[ERROR\]|COMPILATION ERROR|Tests run:|Caused by:|Flyway|Schema-validation' /tmp/backend.log | tail -n 100 || tail -n 100 /tmp/backend.log
          else
            grep -E 'Tests run:|BUILD SUCCESS' /tmp/backend.log | tail -n 20
          fi
          exit "$code"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: TypeScript validation
        shell: bash
        run: |
          set +e
          npm run lint > /tmp/frontend-lint.log 2>&1
          code=$?
          cat /tmp/frontend-lint.log
          exit "$code"
      - name: Frontend unit tests
        shell: bash
        run: |
          set +e
          npm test > /tmp/frontend-test.log 2>&1
          code=$?
          tail -n 120 /tmp/frontend-test.log
          exit "$code"
      - name: Frontend build
        shell: bash
        run: |
          set +e
          npm run build > /tmp/frontend-build.log 2>&1
          code=$?
          tail -n 120 /tmp/frontend-build.log
          exit "$code"

  powershell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test local environment helpers
        shell: pwsh
        run: ./scripts/tests/Local.Common.Tests.ps1

  containers:
    runs-on: ubuntu-latest
    env:
      POSTGRES_HOST_PORT: '15432'
      BACKEND_HOST_PORT: '18081'
      FRONTEND_HOST_PORT: '18080'
      POSTGRES_PASSWORD: ci-postgres-password
      APP_DEV_ADMIN_PASSWORD: ci-admin-password
      JWT_SECRET_BASE64: VGVzdC1zZWNyZXQtd2l0aC1hdC1sZWFzdC0zMi1ieXRlcy1mb3ItY2k=
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose model
        run: docker compose config --quiet
      - name: Build images
        run: docker compose build

  report-status:
    if: always()
    needs: [backend, frontend, powershell, containers]
    runs-on: ubuntu-latest
    steps:
      - name: Publish aggregate commit status
        env:
          GH_TOKEN: ${{ github.token }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          POWERSHELL_RESULT: ${{ needs.powershell.result }}
          CONTAINERS_RESULT: ${{ needs.containers.result }}
        shell: bash
        run: |
          set -euo pipefail
          state=success
          for result in "$BACKEND_RESULT" "$FRONTEND_RESULT" "$POWERSHELL_RESULT" "$CONTAINERS_RESULT"; do
            if [ "$result" != "success" ]; then
              state=failure
            fi
          done
          description="backend=$BACKEND_RESULT frontend=$FRONTEND_RESULT pwsh=$POWERSHELL_RESULT containers=$CONTAINERS_RESULT"
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context='validation/ci-summary' \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
