name: CI

on:
  push:
    branches: ["main", "agent/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Verify backend
        working-directory: backend
        run: |
          set +e
          mvn --batch-mode verify > ../backend-verify.log 2>&1
          echo "$?" > ../backend-exit-code
      - name: Upload backend verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-verification-log
          path: backend-verify.log
      - name: Enforce backend result
        run: test "$(cat backend-exit-code)" -eq 0

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        working-directory: frontend
        run: npm install
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Build
        working-directory: frontend
        run: |
          set +e
          npm run build > ../frontend-build.log 2>&1
          echo "$?" > ../frontend-exit-code
      - name: Upload frontend build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-log
          path: frontend-build.log
      - name: Enforce frontend result
        run: test "$(cat frontend-exit-code)" -eq 0
