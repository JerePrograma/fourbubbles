name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Unit and integration tests
        shell: bash
        run: |
          set +e
          mvn -B -Dstyle.color=never clean verify > /tmp/backend.log 2>&1
          code=$?
          if [ "$code" -ne 0 ]; then
            grep -E '^\[ERROR\]|COMPILATION ERROR|Tests run:|Caused by:|Flyway|Schema-validation' /tmp/backend.log | tail -n 100 || tail -n 100 /tmp/backend.log
          else
            grep -E 'Tests run:|BUILD SUCCESS' /tmp/backend.log | tail -n 20
          fi
          exit "$code"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: TypeScript validation
        shell: bash
        run: |
          set +e
          npm run lint > /tmp/frontend-lint.log 2>&1
          code=$?
          cat /tmp/frontend-lint.log
          exit "$code"
      - name: Frontend unit tests
        shell: bash
        run: |
          set +e
          npm test > /tmp/frontend-test.log 2>&1
          code=$?
          tail -n 120 /tmp/frontend-test.log
          exit "$code"
      - name: Frontend build
        shell: bash
        run: |
          set +e
          npm run build > /tmp/frontend-build.log 2>&1
          code=$?
          tail -n 120 /tmp/frontend-build.log
          exit "$code"

  containers:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-postgres-password
      APP_DEV_ADMIN_PASSWORD: ci-admin-password
      JWT_SECRET_BASE64: VGVzdC1zZWNyZXQtd2l0aC1hdC1sZWFzdC0zMi1ieXRlcy1mb3ItY2k=
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose model
        run: docker compose config --quiet
      - name: Build images
        run: docker compose build
