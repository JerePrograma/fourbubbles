name: Backend diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  backend-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - name: Print only Maven failures
        shell: bash
        run: |
          set -o pipefail
          git clone -q --depth 1 --branch agent/0.1.1-hardening https://github.com/JerePrograma/fourbubbles.git repo
          cd repo/backend
          if [ -n "${JAVA_HOME_21_X64:-}" ]; then
            export JAVA_HOME="$JAVA_HOME_21_X64"
            export PATH="$JAVA_HOME/bin:$PATH"
          fi
          java -version
          set +e
          mvn -B -Dstyle.color=never clean verify > /tmp/backend.log 2>&1
          code=$?
          if [ "$code" -ne 0 ]; then
            grep -E '^\[ERROR\]|COMPILATION ERROR|Tests run:|Failures:|Errors:|Caused by:|expected:|but was:|Flyway|Schema-validation' /tmp/backend.log | tail -n 160 || tail -n 160 /tmp/backend.log
          else
            grep -E 'Tests run:|BUILD SUCCESS' /tmp/backend.log | tail -n 30
          fi
          exit "$code"
