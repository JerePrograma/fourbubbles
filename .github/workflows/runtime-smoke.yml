name: Runtime smoke

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  statuses: write

concurrency:
  group: runtime-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose-smoke:
    runs-on: ubuntu-latest
    env:
      COMPOSE_PROJECT_NAME: fourbubbles-smoke
      POSTGRES_HOST_PORT: '15432'
      BACKEND_HOST_PORT: '18081'
      FRONTEND_HOST_PORT: '18080'
      POSTGRES_DB: ropalista
      POSTGRES_USER: ropalista
      POSTGRES_PASSWORD: smoke-postgres-password
      APP_DEV_ADMIN_USERNAME: admin
      APP_DEV_ADMIN_PASSWORD: smoke-admin-password
      JWT_SECRET_BASE64: U21va2UtdGVzdC1zZWNyZXQtd2l0aC1tb3JlLXRoYW4tMzItYnl0ZXM=
    steps:
      - uses: actions/checkout@v4

      - name: Start frontend before backend to verify deferred DNS
        shell: bash
        run: |
          set -euo pipefail
          docker compose config --quiet
          docker compose up --build -d --no-deps frontend

          for attempt in $(seq 1 30); do
            status=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$(docker compose ps -q frontend)")
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            if [ "$status" = "exited" ] || [ "$status" = "dead" ]; then
              docker compose logs --tail 200 frontend
              exit 1
            fi
            sleep 2
          done

          docker compose ps --all
          docker compose logs --tail 200 frontend
          echo "Frontend did not become healthy before backend startup" >&2
          exit 1

      - name: Start backend and PostgreSQL
        shell: bash
        run: docker compose up --build -d postgres backend

      - name: Verify complete HTTP and database flow
        shell: bash
        run: |
          set -euo pipefail

          for attempt in $(seq 1 80); do
            if curl --fail --silent "http://localhost:${BACKEND_HOST_PORT}/api/actuator/health/readiness" > /tmp/readiness.json; then
              break
            fi
            if [ "$attempt" -eq 80 ]; then
              echo "Backend readiness timeout" >&2
              exit 1
            fi
            sleep 3
          done

          python3 - <<'PY'
          import json
          with open('/tmp/readiness.json', encoding='utf-8') as source:
              payload = json.load(source)
          assert payload.get('status') == 'UP', payload
          PY

          curl --fail --silent "http://localhost:${FRONTEND_HOST_PORT}/" > /tmp/frontend.html
          grep -q '<div id="root"></div>' /tmp/frontend.html

          anonymous_status=$(curl --silent --output /tmp/anonymous.json --write-out '%{http_code}' \
            "http://localhost:${FRONTEND_HOST_PORT}/api/catalog/services")
          test "$anonymous_status" = "401" -o "$anonymous_status" = "403"

          curl --fail --silent \
            --header 'Content-Type: application/json' \
            --data '{"username":"admin","password":"smoke-admin-password"}' \
            "http://localhost:${FRONTEND_HOST_PORT}/api/auth/login" > /tmp/login.json

          python3 - <<'PY' > /tmp/token.txt
          import json
          with open('/tmp/login.json', encoding='utf-8') as source:
              payload = json.load(source)
          assert payload.get('success') is True, payload
          token = payload['data']['accessToken']
          assert token
          print(token)
          PY

          token=$(cat /tmp/token.txt)
          curl --fail --silent \
            --header "Authorization: Bearer $token" \
            "http://localhost:${FRONTEND_HOST_PORT}/api/catalog/services" > /tmp/services.json

          python3 - <<'PY'
          import json
          with open('/tmp/services.json', encoding='utf-8') as source:
              payload = json.load(source)
          assert payload.get('success') is True, payload
          assert len(payload.get('data', [])) >= 1, payload
          PY

          migration_count=$(docker compose exec -T postgres \
            psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -tAc \
            'select count(*) from flyway_schema_history where success = true;')
          test "${migration_count//[[:space:]]/}" -ge 8

          docker compose ps --all

      - name: Show diagnostics on failure
        if: failure()
        run: |
          docker compose ps --all || true
          docker compose logs --tail 300 postgres backend frontend || true

      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans || true

  report-status:
    if: always()
    needs: [compose-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Publish runtime smoke commit status
        env:
          GH_TOKEN: ${{ github.token }}
          SMOKE_RESULT: ${{ needs.compose-smoke.result }}
        shell: bash
        run: |
          set -euo pipefail
          state=failure
          if [ "$SMOKE_RESULT" = "success" ]; then
            state=success
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context='validation/runtime-smoke' \
            -f description="compose-smoke=$SMOKE_RESULT" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
