name: One-shot normalization

on:
  pull_request:

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/0.1.2-administrative
          fetch-depth: 0

      - name: Apply deterministic source corrections
        shell: python
        run: |
          from pathlib import Path

          service = Path('backend/src/main/java/ar/com/ropalista/customer/application/ClientService.java')
          content = service.read_text(encoding='utf-8')
          old = '.sorted(Comparator.comparing(Address::isPrimaryAddress).reversed().thenComparing(Address::getValidFrom).reversed())'
          new = '.sorted(Comparator.comparing(Address::isPrimaryAddress).reversed()\n                        .thenComparing(Address::getValidFrom, Comparator.reverseOrder()))'
          if old not in content:
              raise SystemExit('Expected address comparator was not found')
          service.write_text(content.replace(old, new), encoding='utf-8')

          styles = Path('frontend/src/styles.css')
          css = styles.read_text(encoding='utf-8')
          old_css = 'grid-template-columns: repeat(4,1fr);'
          new_css = 'grid-template-columns: repeat(auto-fit,minmax(0,1fr));'
          if old_css not in css:
              raise SystemExit('Expected mobile navigation grid was not found')
          styles.write_text(css.replace(old_css, new_css, 1), encoding='utf-8')

          Path('.github/workflows/one-shot-normalize.yml').unlink()

      - name: Commit normalized source
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add backend/src/main/java/ar/com/ropalista/customer/application/ClientService.java frontend/src/styles.css .github/workflows/one-shot-normalize.yml
          git commit -m "fix: normalize address ordering and responsive navigation"
          git push origin HEAD:agent/0.1.2-administrative
