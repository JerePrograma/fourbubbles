## Recorrido implementado

Autenticación → cliente → preferencias/domicilios → pedido → cotización automática/manual → planificación → confirmación → estados → pagos → auditoría.

## Regla de alcance

Un estado o una tabla no equivalen a un módulo. `RECEIVED` sin peso/evidencias no completa recepción; pagos sin arqueo no completan caja; preferencias sin matriz no completan compatibilidad.
