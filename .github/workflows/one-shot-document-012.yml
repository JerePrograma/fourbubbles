name: One-shot document 0.1.2

on:
  pull_request:

permissions:
  contents: write

jobs:
  document:
    if: github.head_ref == 'agent/0.1.2-administrative'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/0.1.2-administrative
          fetch-depth: 0

      - name: Write consolidated documentation
        shell: python
        run: |
          from pathlib import Path

          files = {
          'README.md': r'''# Four Bubbles / Ropa Lista

Sistema de gestión integral para una lavandería doméstica con retiro y entrega en Marcos Paz y Mariano Acosta.

> Versión: **0.1.2**. La plataforma base y el circuito administrativo de Fase 1 están implementados. Recepción, producción, logística y finanzas completas todavía no forman parte del MVP disponible.

## Qué funciona hoy

- Java 21, Spring Boot 3, PostgreSQL 16 y Flyway V1–V6.
- React 18, TypeScript, Vite y diseño mobile first.
- JWT corto, refresh token rotativo, RBAC y auditoría.
- Jerarquía de roles: `ADMIN > OPERATOR > DRIVER > REPORT_VIEWER`.
- Respuestas JSON uniformes, `X-Request-ID`, MDC y logs correlacionados.
- Protección local contra intentos repetidos de login.
- Clientes con preferencias tipadas.
- Domicilios activos, principal, alternativos, vigencia e historial.
- Servicios, equivalencias, precios y promociones versionados.
- Pedidos con piezas físicas, grupos, unidades equivalentes, límites y precio histórico.
- Cotización automática y cotización manual administrativa trazable.
- Planificación editable antes de confirmar el precio.
- Confirmación promocional protegida por bloqueo pesimista y revalidación.
- Estados y transiciones permitidas.
- Pagos parciales/totales e historial por pedido.
- Auditoría consultable por administradores.
- CI de backend, frontend y contenedores.
- Smoke test que levanta el stack completo y prueba readiness, SPA, login y API autenticada.

## Inicio rápido en Windows

```powershell
git clone https://github.com/JerePrograma/fourbubbles.git
Set-Location '.\fourbubbles'
git switch main
git pull --ff-only origin main
Set-ExecutionPolicy -Scope Process Bypass
.\scripts\Start-Local.ps1 -Rebuild
.\scripts\Verify-Local.ps1
```

El script crea `.env` solo cuando no existe, genera secretos aleatorios, inicia PostgreSQL/backend/frontend y muestra la contraseña de desarrollo una sola vez.

Accesos:

- Aplicación: `http://localhost:8080`
- API: `http://localhost:8081/api`
- Swagger: `http://localhost:8081/api/swagger-ui.html`
- Salud: `http://localhost:8081/api/actuator/health`

Usuario inicial: valor de `APP_DEV_ADMIN_USERNAME`, por defecto `admin`.

## Flujo operativo 0.1.2

1. Iniciar sesión.
2. Crear o buscar cliente.
3. Registrar preferencias y domicilios.
4. Cambiar domicilio principal o desactivar uno anterior sin borrar historia.
5. Crear pedido seleccionando cliente, domicilio, servicio y prendas.
6. Revisar piezas, grupos, unidades equivalentes, peso estimado y límites.
7. Si el pedido requiere presupuesto, un `ADMIN` registra importe y motivo manual.
8. Editar retiro, promesa y notas mientras el precio no esté confirmado.
9. Confirmar el precio.
10. Avanzar únicamente por transiciones habilitadas.
11. Registrar pagos parciales o totales.
12. Consultar historial de pagos.
13. Un administrador puede revisar la auditoría completa.

## Validación local

```bash
cd backend
mvn clean verify

cd ../frontend
npm ci
npm run lint
npm test
npm run build

cd ..
docker compose config --quiet
docker compose build
```

## Endpoints principales

| Método | Ruta | Uso |
|---|---|---|
| POST | `/api/auth/login` | iniciar sesión |
| POST | `/api/auth/refresh` | rotar refresh token |
| POST | `/api/auth/logout` | cerrar sesión |
| GET | `/api/catalog/services` | servicios vigentes |
| GET | `/api/catalog/equivalences` | equivalencias vigentes |
| POST | `/api/clients` | crear cliente |
| PUT | `/api/clients/{id}` | actualizar perfil y preferencias |
| POST | `/api/clients/{id}/addresses` | agregar domicilio |
| POST | `/api/clients/{id}/addresses/{addressId}/make-primary` | cambiar principal |
| DELETE | `/api/clients/{id}/addresses/{addressId}` | baja lógica de domicilio |
| POST | `/api/orders` | crear/cotizar pedido |
| GET | `/api/orders` | buscar pedidos |
| GET | `/api/orders/{id}` | detalle operativo |
| PATCH | `/api/orders/{id}/planning` | editar planificación previa |
| POST | `/api/orders/{id}/manual-quote` | cotización manual `ADMIN` |
| POST | `/api/orders/{id}/confirm-price` | confirmar precio |
| PATCH | `/api/orders/{id}/status` | cambiar estado |
| POST | `/api/payments` | registrar pago |
| GET | `/api/payments?orderId=...` | historial de pagos |
| GET | `/api/audit` | auditoría administrativa |

## Límites actuales

- Sin peso real ni recepción guiada.
- Sin fotografías, daños o manchas.
- Sin edición de composición después de crear el pedido.
- Sin compatibilidad, ciclos ni máquinas.
- Sin rutas ni agenda logística real.
- Sin caja diaria, costos o rentabilidad.
- Sin abonos, inventario, mantenimiento o reclamos.
- El rate limiter de login es local a una instancia.

## Documentación

- [Estado integral](docs/PROJECT_STATUS.md)
- [Guía funcional](docs/USER_GUIDE.md)
- [API](docs/API.md)
- [Seguridad](docs/SECURITY.md)
- [Pruebas](docs/TESTING.md)
- [Operación](docs/OPERATIONS.md)
- [Alcance funcional](docs/FUNCTIONAL_SCOPE.md)
- [Roadmap](docs/ROADMAP.md)
- [Arquitectura](docs/ARCHITECTURE.md)
- [Modelo de datos](docs/DATA_MODEL.md)
- [Supuestos](docs/ASSUMPTIONS.md)
- [Changelog](CHANGELOG.md)
''',
