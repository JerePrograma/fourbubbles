          'docs/API.md': r'''# Contrato API 0.1.2

La API se sirve bajo `/api`. Swagger local: `/api/swagger-ui.html`.

## Respuesta exitosa

```json
{"success":true,"data":{},"timestamp":"2026-07-20T12:00:00-03:00"}
```

## Error

```json
{
  "success": false,
  "code": "VALIDATION_ERROR",
  "message": "La solicitud contiene datos inválidos",
  "status": 400,
  "path": "/api/clients",
  "timestamp": "2026-07-20T12:00:00-03:00",
  "violations": [{"field":"firstName","message":"no debe estar vacío"}]
}
```

Códigos relevantes: `AUTHENTICATION_REQUIRED`, `AUTHENTICATION_FAILED`, `ACCESS_DENIED`, `LOGIN_RATE_LIMITED`, `ORDER_NOT_EDITABLE`, `MANUAL_QUOTE_REQUIRED`, `PAYMENT_EXCEEDS_BALANCE`.

## Correlación

Cada respuesta incluye `X-Request-ID`. Solo se conserva un valor entrante que cumpla `[A-Za-z0-9._-]{8,128}`; los demás se reemplazan por UUID.

## Roles

Jerarquía:

```text
ADMIN > OPERATOR > DRIVER > REPORT_VIEWER
```

- `ADMIN`: administración completa y cotización manual.
- `OPERATOR`: clientes, pedidos, planificación y pagos.
- `DRIVER`: lectura y transiciones operativas permitidas.
- `REPORT_VIEWER`: consulta.

## Endpoints

### Autenticación

- `POST /auth/login`
- `POST /auth/refresh`
- `POST /auth/logout`

### Catálogo

- `GET /catalog/services`
- `GET /catalog/equivalences`

### Clientes

- `POST /clients`
- `GET /clients`
- `GET /clients/{id}`
- `PUT /clients/{id}`
- `POST /clients/{id}/addresses`
- `POST /clients/{id}/addresses/{addressId}/make-primary`
- `DELETE /clients/{id}/addresses/{addressId}`

`ClientResponse` separa `addresses` activos y `addressHistory`. Cada dirección incluye `active`, `validFrom` y `validTo`.

### Pedidos

- `POST /orders`
- `GET /orders`
- `GET /orders/{id}`
- `PATCH /orders/{id}/planning`
- `POST /orders/{id}/manual-quote` (`ADMIN`)
- `POST /orders/{id}/confirm-price`
- `PATCH /orders/{id}/status`

El detalle expone:

- `automaticQuotedPrice`;
- `quotedPrice`;
- `confirmedPrice`;
- `manualQuoteReason`, `manualQuoteAt`, `manualQuoteBy`;
- `allowedTransitions`;
- piezas y planificación.

La planificación solo puede editarse en `INQUIRY` o `QUOTED` y antes de confirmar.

La cotización manual requiere importe positivo y motivo. Conserva el precio automático y agrega una línea al desglose.

### Pagos

- `POST /payments`
- `GET /payments?orderId=<UUID>`

El historial devuelve método, importe, fecha, referencia, estado y actor.

### Auditoría

- `GET /audit?entityType=&entityId=&action=&page=&size=` (`ADMIN`)

## Concurrencia promocional

Al confirmar:

1. se bloquea la fila de promoción con `PESSIMISTIC_WRITE`;
2. se revalida estado, vigencia, servicio, primera compra, domicilio y cupos;
3. se registra el uso;
4. se confirma el precio.

Esto serializa confirmaciones competidoras para la misma promoción.

## Convenciones

- dinero con decimal/`BigDecimal`;
- peso en gramos;
- fechas ISO 8601 con offset;
- moneda de tres caracteres;
- entidades JPA no expuestas;
- `Page` de Spring usado internamente.

## Pendiente antes de API externa

- `/v1` o política de compatibilidad;
- idempotencia;
- contrato de paginación propio;
- webhooks/pagos externos;
- edición de recepción;
- evidencias.
''',
          'docs/SECURITY.md': r'''# Seguridad 0.1.2

## Implementado

- BCrypt costo 12.
- JWT HS256 corto.
- Refresh opaco, hasheado, rotativo y revocable.
- Cookie `HttpOnly`, `SameSite=Strict`, `Secure` en producción.
- Sesiones stateless.
- RBAC con jerarquía `ADMIN > OPERATOR > DRIVER > REPORT_VIEWER`.
- Autoridad real en `@PreAuthorize`; la UI solo oculta acciones.
- 401/403 JSON uniformes.
- Validación de entradas y parámetros.
- `X-Request-ID` seguro y MDC.
- Logs sin secretos.
- Limitador local de intentos de login.
- Cotización manual exclusiva de `ADMIN` y auditada.
- Confirmación promocional bajo bloqueo pesimista.
- Auditoría consultable solo por `ADMIN`.

## Jerarquía

La herencia concede capacidades de lectura inferiores sin repetir combinaciones en cada método. No convierte una operación `hasRole('ADMIN')` en heredable por `OPERATOR`.

## Login

Variables:

- `LOGIN_MAX_ATTEMPTS=5`
- `LOGIN_ATTEMPT_WINDOW=PT15M`
- `LOGIN_BLOCK_DURATION=PT15M`

Límite: contador en memoria, no compartido entre réplicas y reiniciable. Producción distribuida requiere Redis/gateway.

## Proxy

La aplicación usa la dirección observada por el servlet. Un proxy productivo debe sobrescribir cabeceras reenviadas y estar configurado como confiable. No se debe confiar en `X-Forwarded-For` directo de Internet.

## Promociones

La revalidación al confirmar evita consumir un beneficio basado solo en una cotización antigua. El bloqueo de la fila promocional serializa las confirmaciones para aplicar cupos y restricción por domicilio de forma coherente.

## Cotización manual

- solo `ADMIN`;
- importe positivo;
- motivo obligatorio;
- actor y fecha persistidos;
- precio automático conservado;
- auditoría del antes/después.

## Pendiente

- rate limiter compartido y perimetral;
- MFA;
- administración de usuarios/roles;
- recuperación de contraseña;
- revocación global de sesiones;
- CSP/HSTS/cabeceras productivas;
- escaneo de dependencias, imágenes y secretos;
- SBOM;
- almacenamiento cifrado de evidencias;
- políticas de retención/anonimización;
- alertas sobre auditoría.
''',
          'docs/TESTING.md': r'''# Estrategia de pruebas 0.1.2

## CI principal

### Backend

- Java 21;
- `mvn clean verify`;
- unitarias JUnit/Mockito;
- MockMvc;
- Testcontainers PostgreSQL 16;
- Flyway V1–V6;
- validación Hibernate/JPA.

### Frontend

- Node 22;
- `npm ci`;
- TypeScript estricto;
- Vitest;
- build Vite.

### Contenedores

- `docker compose config --quiet`;
- build backend/frontend.

## Runtime smoke

Workflow independiente:

1. construye e inicia el stack completo;
2. espera readiness;
3. valida `status=UP`;
4. verifica la SPA;
5. inicia sesión con el administrador de smoke;
6. consulta `/api/catalog/services` con bearer token;
7. imprime logs si falla;
8. elimina contenedores y volumen temporal.

## Cobertura de reglas

- equivalencias y redondeo de grupos;
- límites de servicio/capacidad;
- transiciones;
- precio/promociones;
- login rate limiting;
- 401/403/correlación;
- cliente y preferencias;
- pedido, búsqueda y confirmación;
- pago parcial/total;
- domicilios activos/históricos;
- cotización manual;
- planificación bloqueada después de confirmar;
- historial de pagos;
- auditoría;
- jerarquía RBAC;
- carrera concurrente de promoción por domicilio;
- cálculo frontend del borrador.

## Escenario concurrente

Dos pedidos del mismo domicilio intentan confirmar simultáneamente una promoción `one_per_address`. La prueba espera exactamente una respuesta 200 y una 422. Esto verifica el bloqueo y la revalidación dentro de transacción.

## Pendiente

- refresh/logout end-to-end;
- recuperación de contraseña;
- edición de recepción;
- upload/evidencias;
- E2E de navegador;
- backup/restauración automatizados;
- pruebas de carga;
- compatibilidad/ciclos/logística/costos.

## Comandos

```bash
cd backend && mvn clean verify
cd ../frontend && npm ci && npm run lint && npm test && npm run build
cd .. && docker compose config --quiet && docker compose build
```
''',
          'docs/OPERATIONS.md': r'''# Operación y despliegue 0.1.2

## Perfiles

- `dev`: administrador inicial y logs de desarrollo.
- `test`: PostgreSQL Testcontainers y validación.
- `prod`: cookie segura y logs JSON correlacionados.

El Compose actual usa `dev`: sirve para desarrollo/demostración, no producción.

## Inicio

```powershell
Set-ExecutionPolicy -Scope Process Bypass
.\scripts\Start-Local.ps1 -Rebuild
.\scripts\Verify-Local.ps1
```

Manual:

```bash
cp .env.example .env
docker compose config --quiet
docker compose up --build -d
docker compose ps
```

## Migraciones

V6 agrega:

- vigencia de domicilios;
- precio automático preservado;
- metadatos de cotización manual.

Reglas:

- no editar migraciones desplegadas;
- crear una nueva Vn;
- probar PostgreSQL vacío y upgrade;
- mantener JPA con `validate`.

## Salud y logs

```bash
curl --fail http://localhost:8081/api/actuator/health/readiness
docker compose logs -f backend
```

Cada respuesta expone `X-Request-ID` para correlación.

## Runtime smoke

`.github/workflows/runtime-smoke.yml` levanta el stack y prueba HTTP real. Complementa el build de imágenes; no lo reemplaza.

## Backup

```bash
docker compose exec -T postgres pg_dump -U ropalista -d ropalista --format=custom > ropalista.dump
```

No es válido hasta restaurarlo en una base de prueba.

## Actualización

```powershell
git switch main
git pull --ff-only origin main
.\scripts\Start-Local.ps1 -Rebuild
.\scripts\Verify-Local.ps1
```

## Detener

```bash
docker compose down
```

Destructivo:

```bash
docker compose down -v --remove-orphans
```

## Producción requiere

- perfil `prod`;
- TLS/dominio/CORS;
- gestor de secretos;
- PostgreSQL persistente;
- backups restaurables;
- rate limiting compartido/perimetral;
- proxy confiable;
- almacenamiento externo de evidencias;
- observabilidad y alertas;
- límites de recursos;
- CSP/HSTS;
- escaneo de dependencias/imágenes/secretos;
- rollback y migración controlada;
- cuenta administrativa fuera del inicializador `dev`.
''',
          'docs/USER_GUIDE.md': r'''# Guía de uso funcional 0.1.2

## 1. Iniciar sesión

Abrir `http://localhost:8080` e ingresar el usuario/contraseña definidos en `.env` o generados por `Start-Local.ps1`.

## 2. Clientes

### Crear

1. Clientes → Nuevo.
2. Completar datos.
3. Registrar preferencias.
4. Crear domicilio principal.
5. Guardar.

### Editar perfil

Editar permite cambiar datos, estado y preferencias.

### Domicilios

En la misma pantalla:

- agregar domicilio alternativo;
- marcar un domicilio como principal;
- desactivar uno no principal;
- consultar historial y vigencia.

No se puede desactivar el principal ni dejar al cliente sin domicilio activo. Para reemplazar el principal, crear/seleccionar otro y marcarlo principal antes de desactivar el anterior.

## 3. Crear pedido

1. Pedidos → Nuevo pedido.
2. Seleccionar cliente y domicilio activo.
3. Elegir servicio.
4. Agregar prendas y piezas físicas.
5. Revisar grupos/unidades/peso estimado.
6. Informar peso declarado, promoción, retiro, promesa y notas.
7. Crear y cotizar.

## 4. Cotización

El detalle muestra:

- precio automático;
- precio vigente;
- precio confirmado;
- desglose;
- límite y necesidad de presupuesto.

Si `requiresQuote=true`, solo un `ADMIN` puede registrar importe manual y motivo. El sistema conserva el precio automático para comparación y auditoría.

## 5. Planificación

Mientras el pedido está en `INQUIRY` o `QUOTED` y el precio no fue confirmado, `ADMIN`/`OPERATOR` pueden editar retiro, promesa y notas.

Después de confirmar, la edición se bloquea.

## 6. Confirmar precio

Al confirmar:

- se vuelve histórico;
- se revalida la promoción bajo bloqueo;
- se registra uso promocional;
- se audita;
- `QUOTED` pasa a `WAITING_CONFIRMATION`.

## 7. Estados

El selector muestra solo transiciones legales. No usar estados como sustituto de procesos físicos inexistentes: `RECEIVED` todavía no registra peso real ni evidencias.

## 8. Pagos

Con precio confirmado:

1. elegir medio;
2. ingresar importe;
3. referencia opcional;
4. registrar.

El historial muestra fecha, método, importe, referencia, estado y actor. El sistema bloquea importes no positivos y sobrepagos.

## 9. Auditoría

Solo `ADMIN` ve Auditoría. Puede filtrar por tipo de entidad, identificador y acción, y revisar valores anterior/nuevo.

## 10. Roles

- `ADMIN`: todo el circuito, cotización manual y auditoría.
- `OPERATOR`: clientes, pedidos, planificación, estados y pagos.
- `DRIVER`: consulta y transiciones operativas.
- `REPORT_VIEWER`: consulta.

## 11. Qué no hacer todavía

- No usar `RECEIVED` como recepción completa.
- No planificar ciclos o compatibilidad.
- No usar Agenda/Dashboard como fuente operativa completa.
- No usar pagos como caja formal.
- No ejecutar `docker compose down -v` si hay datos a conservar.
- No desplegar el perfil `dev` en producción.
''',
          'docs/FUNCTIONAL_SCOPE.md': r'''# Alcance funcional 0.1.2

