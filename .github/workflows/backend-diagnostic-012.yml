name: Backend diagnostic 0.1.2

on:
  pull_request:

permissions:
  contents: read

jobs:
  backend-diagnostic:
    if: github.head_ref == 'agent/0.1.2-administrative'
    runs-on: ubuntu-latest
    steps:
      - name: Print only Maven failures
        shell: bash
        run: |
          set -o pipefail
          git clone -q --depth 1 --branch agent/0.1.2-administrative https://github.com/JerePrograma/fourbubbles.git repo
          cd repo/backend
          if [ -n "${JAVA_HOME_21_X64:-}" ]; then
            export JAVA_HOME="$JAVA_HOME_21_X64"
            export PATH="$JAVA_HOME/bin:$PATH"
          fi
          java -version
          set +e
          mvn -B -Dstyle.color=never clean verify > /tmp/backend.log 2>&1
          code=$?
          if [ "$code" -ne 0 ]; then
            grep -E '^\[ERROR\]|COMPILATION ERROR|Tests run:|Failures:|Errors:|Caused by:|expected:|but was:|constraint|duplicate key|AssertionFailedError|BusinessException|Exception:' /tmp/backend.log | tail -n 220 || true
            for report in target/failsafe-reports/*AdministrativeFlowIT*.txt target/failsafe-reports/TEST-*AdministrativeFlowIT*.xml; do
              if [ -f "$report" ]; then
                echo "===== $report ====="
                cat "$report"
              fi
            done
            echo '===== application log tail ====='
            tail -n 320 /tmp/backend.log
          else
            grep -E 'Tests run:|BUILD SUCCESS' /tmp/backend.log | tail -n 50
          fi
          exit "$code"
