name: Backend diagnostic 0.1.2

on:
  pull_request:

permissions:
  contents: read

jobs:
  backend-diagnostic:
    if: github.head_ref == 'agent/0.1.2-administrative'
    runs-on: ubuntu-latest
    steps:
      - name: Print only Maven failures
        shell: bash
        run: |
          set -o pipefail
          git clone -q --depth 1 --branch agent/0.1.2-administrative https://github.com/JerePrograma/fourbubbles.git repo
          cd repo/backend
          if [ -n "${JAVA_HOME_21_X64:-}" ]; then
            export JAVA_HOME="$JAVA_HOME_21_X64"
            export PATH="$JAVA_HOME/bin:$PATH"
          fi
          set +e
          mvn -B -Dstyle.color=never clean verify > /tmp/backend.log 2>&1
          code=$?
          if [ "$code" -ne 0 ]; then
            python3 - <<'PY'
          from pathlib import Path
          lines = Path('/tmp/backend.log').read_text(encoding='utf-8', errors='replace').splitlines()
          status_indexes = [i for i, line in enumerate(lines) if 'Status = 500' in line]
          if status_indexes:
              index = status_indexes[-1]
              start_candidates = [i for i in range(index, -1, -1) if 'MockHttpServletRequest:' in lines[i]]
              start = start_candidates[0] if start_candidates else max(0, index - 45)
              end = min(len(lines), index + 18)
              print('===== failing MockMvc exchange =====')
              print('\n'.join(lines[start:end]))
          exception_indexes = [i for i, line in enumerate(lines) if 'Resolved Exception:' in line]
          if exception_indexes:
              index = exception_indexes[-1]
              print('===== resolved exception context =====')
              print('\n'.join(lines[max(0, index - 3):min(len(lines), index + 14)]))
          print('===== failing test summary =====')
          for line in lines:
              if ('AdministrativeFlowIT' in line or line.startswith('[ERROR] Tests run:') or
                  'Caused by:' in line or 'DataIntegrityViolation' in line or
                  'ConstraintViolation' in line or 'NullPointerException' in line):
                  print(line)
          PY
          else
            grep -E 'Tests run:|BUILD SUCCESS' /tmp/backend.log | tail -n 50
          fi
          exit "$code"
