name: One-shot finalize 0.1.2

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  finalize:
    if: github.head_ref == 'agent/0.1.2-administrative'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      POSTGRES_PASSWORD: finalize-postgres-password
      APP_DEV_ADMIN_USERNAME: admin
      APP_DEV_ADMIN_PASSWORD: finalize-admin-password
      JWT_SECRET_BASE64: RmluYWxpemUtdGVzdC1zZWNyZXQtd2l0aC1tb3JlLXRoYW4tMzItYnl0ZXM=
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/0.1.2-administrative
          fetch-depth: 0

      - name: Wait for documentation writers and normalize final tree
        shell: bash
        run: |
          set -euo pipefail
          ready=0
          for attempt in $(seq 1 60); do
            git fetch origin agent/0.1.2-administrative
            git reset --hard origin/agent/0.1.2-administrative
            if grep -q 'Versión: \*\*0.1.2\*\*' README.md \
              && grep -q 'Versión documentada: `0.1.2`' docs/PROJECT_STATUS.md \
              && grep -q 'V6: vigencia' docs/DATA_MODEL.md; then
              ready=1
              break
            fi
            sleep 10
          done
          if [ "$ready" -ne 1 ]; then
            echo 'Timed out waiting for consolidated 0.1.2 documentation' >&2
            exit 1
          fi

          python3 - <<'PY'
          from pathlib import Path

          client = Path('backend/src/main/java/ar/com/ropalista/customer/application/ClientService.java')
          content = client.read_text(encoding='utf-8')
          content = content.replace(
              '.sorted(Comparator.comparing(Address::isPrimaryAddress).reversed().thenComparing(Address::getValidFrom).reversed())',
              '.sorted(Comparator.comparing(Address::isPrimaryAddress).reversed()\n                        .thenComparing(Address::getValidFrom, Comparator.reverseOrder()))'
          )
          old_add = '''        if (request.primaryAddress()) {
            activeAddresses.stream().filter(Address::isPrimaryAddress).forEach(Address::demotePrimary);
        }
        Address address = toAddress(request);'''
          new_add = '''        if (request.primaryAddress()) {
            activeAddresses.stream().filter(Address::isPrimaryAddress).forEach(Address::demotePrimary);
            addresses.flush();
        }
        Address address = toAddress(request);'''
          content = content.replace(old_add, new_add)
          old_primary = '''        addresses.findByClientIdAndActiveTrueOrderByPrimaryAddressDescValidFromDesc(clientId)
                .stream().filter(Address::isPrimaryAddress).forEach(Address::demotePrimary);
        target.makePrimary();'''
          new_primary = '''        addresses.findByClientIdAndActiveTrueOrderByPrimaryAddressDescValidFromDesc(clientId)
                .stream().filter(Address::isPrimaryAddress).forEach(Address::demotePrimary);
        addresses.flush();
        target.makePrimary();'''
          content = content.replace(old_primary, new_primary)
          client.write_text(content, encoding='utf-8')

          audit = Path('backend/src/main/java/ar/com/ropalista/audit/application/AuditQueryService.java')
          content = audit.read_text(encoding='utf-8')
          content = content.replace('builder.upper(root.get("entityType"))', 'builder.upper(root.<String>get("entityType"))')
          content = content.replace('builder.upper(root.get("action"))', 'builder.upper(root.<String>get("action"))')
          audit.write_text(content, encoding='utf-8')

          order = Path('backend/src/main/java/ar/com/ropalista/order/application/OrderService.java')
          content = order.read_text(encoding='utf-8')
          old_planning = '''        LaundryOrder order = find(id);
        var before = planningSummary(order);
        try {'''
          new_planning = '''        LaundryOrder order = find(id);
        if (order.getStatus() != OrderStatus.INQUIRY && order.getStatus() != OrderStatus.QUOTED) {
            throw new BusinessException("ORDER_NOT_EDITABLE",
                    "La planificación solo puede modificarse durante consulta o cotización", HttpStatus.UNPROCESSABLE_ENTITY);
        }
        var before = planningSummary(order);
        try {'''
          content = content.replace(old_planning, new_planning, 1)
          order.write_text(content, encoding='utf-8')

          editor = Path('frontend/src/pages/EditClientPage.tsx')
          content = editor.read_text(encoding='utf-8')
          marker = "import { useCallback, useEffect, useState } from 'react';"
          if "import type { FormEvent } from 'react';" not in content:
              content = content.replace(marker, marker + "\nimport type { FormEvent } from 'react';")
          content = content.replace('React.FormEvent<HTMLFormElement>', 'FormEvent<HTMLFormElement>')
          editor.write_text(content, encoding='utf-8')

          styles = Path('frontend/src/styles.css')
          css = styles.read_text(encoding='utf-8')
          css = css.replace('grid-template-columns: repeat(4,1fr);', 'grid-template-columns: repeat(auto-fit,minmax(0,1fr));', 1)
          styles.write_text(css, encoding='utf-8')

          for workflow in Path('.github/workflows').glob('one-shot-*.yml'):
              workflow.unlink()
          PY

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m 'chore: finalize clean 0.1.2 release tree'
            git pull --rebase origin agent/0.1.2-administrative
            git push origin HEAD:agent/0.1.2-administrative
          fi
          git fetch origin agent/0.1.2-administrative
          git reset --hard origin/agent/0.1.2-administrative
          if find .github/workflows -maxdepth 1 -name 'one-shot-*.yml' | grep -q .; then
            echo 'Temporary workflows remain in final tree' >&2
            exit 1
          fi

      - name: Validate release SHA
        shell: bash
        run: |
          set -euo pipefail
          validate() {
            (
              cd backend
              mvn -B -Dstyle.color=never clean verify
            )
            (
              cd frontend
              npm ci --no-audit --no-fund
              npm run lint
              npm test
              npm run build
            )
            docker compose config --quiet
            docker compose build
          }

          for pass in 1 2 3; do
            validated_sha=$(git rev-parse HEAD)
            validate
            git fetch origin agent/0.1.2-administrative
            remote_sha=$(git rev-parse origin/agent/0.1.2-administrative)
            if [ "$validated_sha" = "$remote_sha" ]; then
              echo "$validated_sha" > /tmp/validated-sha
              break
            fi
            if [ "$pass" -eq 3 ]; then
              echo 'Branch kept changing during validation' >&2
              exit 1
            fi
            git reset --hard "$remote_sha"
          done

      - name: Runtime smoke on validated SHA
        shell: bash
        run: |
          set -euo pipefail
          cleanup() {
            code=$?
            trap - EXIT
            if [ "$code" -ne 0 ]; then
              docker compose ps || true
              docker compose logs --tail 300 || true
            fi
            docker compose down -v --remove-orphans || true
            exit "$code"
          }
          trap cleanup EXIT

          docker compose up -d
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://localhost:8081/api/actuator/health/readiness > /tmp/readiness.json; then
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              exit 1
            fi
            sleep 3
          done

          python3 - <<'PY'
          import json
          with open('/tmp/readiness.json', encoding='utf-8') as source:
              assert json.load(source).get('status') == 'UP'
          PY

          curl --fail --silent http://localhost:8080/ | grep -q '<div id="root"></div>'
          curl --fail --silent \
            -H 'Content-Type: application/json' \
            -d '{"username":"admin","password":"finalize-admin-password"}' \
            http://localhost:8081/api/auth/login > /tmp/login.json
          token=$(python3 - <<'PY'
          import json
          with open('/tmp/login.json', encoding='utf-8') as source:
              data=json.load(source)
          assert data.get('success') is True
          print(data['data']['accessToken'])
          PY
          )
          curl --fail --silent -H "Authorization: Bearer $token" \
            http://localhost:8081/api/catalog/services > /tmp/services.json
          python3 - <<'PY'
          import json
          with open('/tmp/services.json', encoding='utf-8') as source:
              data=json.load(source)
          assert data.get('success') is True and len(data.get('data', [])) > 0
          PY

      - name: Update pull request and merge
        shell: bash
        run: |
          set -euo pipefail
          validated_sha=$(cat /tmp/validated-sha)
          cat > /tmp/pr-body.md <<EOF
          ## Resultado

          Entrega la versión 0.1.2 y cierra el circuito administrativo previo a recepción.

          ### Implementado

          - Flyway V6 aditiva.
          - Domicilios con vigencia, principal, baja lógica e historial.
          - Cotización manual con precio automático preservado, actor, motivo y fecha.
          - Planificación editable solo antes de confirmar.
          - Historial de pagos.
          - Auditoría administrativa consultable.
          - Jerarquía RBAC explícita.
          - Bloqueo pesimista y revalidación promocional concurrente.
          - UI administrativa completa.
          - Runtime smoke real del stack.
          - Documentación integral 0.1.2.

          ### Validación final

          SHA validado: \`$validated_sha\`.

          - Maven clean verify: exitoso.
          - PostgreSQL/Testcontainers/Flyway V1-V6/JPA: exitoso.
          - TypeScript/Vitest/Vite: exitoso.
          - Docker Compose e imágenes: exitoso.
          - Readiness, SPA, login y API autenticada: exitoso.
          - Workflows temporales: retirados.

          ### Pendiente

          El siguiente corte es 0.2.0 Recepción: peso y conteo reales, diferencias, evidencias, daños/manchas, recalculo/aprobación y trazabilidad física.
          EOF

          gh pr edit 4 --title 'Ropa Lista 0.1.2: cierre administrativo de Fase 1' --body-file /tmp/pr-body.md
          gh pr ready 4 || true
          gh pr merge 4 --squash \
            --subject 'feat: complete Ropa Lista 0.1.2 administrative closure' \
            --body 'Adds versioned addresses, manual quotations, payment history, audit queries, atomic promotion confirmation, RBAC hierarchy, runtime smoke tests, UI workflows, and consolidated documentation.'
