spring:
  application:
    name: ropa-lista
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ropa_lista}
    username: ${DB_USERNAME:ropa_lista}
    password: ${DB_PASSWORD:change-me-local-only}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
    time-zone: America/Argentina/Buenos_Aires

server:
  port: 8080
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  timezone: America/Argentina/Buenos_Aires
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  jwt:
    secret-base64: ${JWT_SECRET_BASE64:Y2hhbmdlLW1lLXdpdGgtYXQtbGVhc3QtNjQtYnl0ZXMtb2YtcmFuZG9tLWRhdGEtaW4tcHJvZA==}
    access-ttl: ${JWT_ACCESS_TTL:PT15M}
    refresh-ttl: ${JWT_REFRESH_TTL:P30D}

logging:
  level:
    root: INFO
    com.fourbubbles.ropalista: INFO
