spring:
  application:
    name: ropa-lista
  profiles:
    default: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ropalista}
    username: ${DB_USER:ropalista}
    password: ${DB_PASSWORD:ropalista}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
  jackson:
    time-zone: ${APP_TIME_ZONE:America/Argentina/Buenos_Aires}
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  security:
    jwt-secret-base64: ${JWT_SECRET_BASE64}
    access-ttl: ${JWT_ACCESS_TTL:PT15M}
    refresh-ttl: ${REFRESH_TOKEN_TTL:P30D}
    refresh-cookie-name: ropa_lista_refresh
    secure-cookie: ${SECURE_COOKIE:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}
  time-zone: ${APP_TIME_ZONE:America/Argentina/Buenos_Aires}
