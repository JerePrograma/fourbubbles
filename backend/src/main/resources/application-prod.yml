spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false

server:
  forward-headers-strategy: framework

app:
  security:
    secure-cookie: true

logging:
  level:
    root: INFO
    ar.com.ropalista: INFO
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%p","logger":"%logger{36}","thread":"%thread","message":"%replace(%m){''[\r\n]+'','' ''}"}%n'
